version: '3.8'

services:
  # Django Application
  web:
    image: n1dovud/library-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_web
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      - DEBUG=False
    depends_on:
      db:
        condition: service_healthy
    networks:
      - library_network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: library_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-library_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-library_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: library_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - library_network

  # Certbot for SSL (optional, for production)
  certbot:
    image: certbot/certbot
    container_name: library_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - library_network

volumes:
  postgres_data:
    name: library_postgres_data
  static_volume:
    name: library_static
  media_volume:
    name: library_media

networks:
  library_network:
    name: library_network
    driver: bridge
