version: '3.8'

# Development configuration - extends docker-compose.yml
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_web_dev
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      - DEBUG=True
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - library_network

  db:
    image: postgres:15-alpine
    container_name: library_db_dev
    restart: unless-stopped
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-library_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-library_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library_network

volumes:
  postgres_data_dev:
    name: library_postgres_data_dev
  static_volume:
    name: library_static_dev
  media_volume:
    name: library_media_dev

networks:
  library_network:
    name: library_network_dev
    driver: bridge
